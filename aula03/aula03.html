<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="margin-bottom: 500px;">
    <h1> Trabalhando com tabelas</h1>
    <h3>Colspan</h1>
<table id="TabelaDados"> 
<tr>
    <th class="CabeçalhoTabelas">Nome</th>
    <th class="CabeçalhoTabelas">Idade</th>
    <th class="CabeçalhoTabelas">Cidade</th>
</tr>
<tr>
    <td>João</td>
    <td>29</td>
    <td>Fortaleza</td>
</tr>
<tr>
    <td>Maria</td>
    <td colspan="">28</td>
    <td>Caucaia</td>
    
</tr>
</table>
<br>
<hr>
<br>
<h3>rowspan</h3>
<table id="TabelaLinguagens">
    <tr>
        <th>Linguagens</th>
        <th>Frameworks</th>
    </tr>
<tr>
    <td rowspan="2">Python</td>
    <td>Flask</td>
</tr>
<tr>
    <td>FastAPI</td>
</tr>
<tr>
    <td rowspan="2">JavaScript</td>
     <td>React</td>
   
</tr>
<tr>
    <td>Angular</td>
</tr>
</table>
<style>
    table, td, tr, th{
        border: 1px solid 
        black;
        border-collapse: collapse;
        padding: 3px;
    }    
</style>

<h1>Formulários</h1>
<form>
    <label for="nome">Nome:</label><br>
    <input name="nome" placeholder="Hesed" id="nome" type="text">
    <br><br>
    <label for="senha">Senha:</label><br>
    <input name="senha" placeholder="*****" type="password" name="senha" id="senha">
    <br><br>
    <label for="email">E-mail:</label><br>
     <input name="email" placeholder="Hesed@gmail.com" type="email" name="" id="email"><br><br>
     <br><br>

    <label for="">Idade:</label><br>
    <input name="Idade" type="number" step="1" min="0" max="120" id="Idade">
    <br><br>
<h3>Vagas</h3>


    <input name="vaga" id="Front" type="radio" value="Front">
    <label for="vaga">Front</label>
    <br>
    <input name="vaga" id="back" type="radio" value="back">
    <label for="vaga">back</label>
    
<h3>linguagens conhecidas</h3>
<input type="checkbox" name="Linguagens" id="Python" value="Python">
<label for="Python">Python</label><br>
<br>
<input type="checkbox" name="Linguagens" id="JavaScript" value="JavaScript">
<label for="JavaScript">JavaScript</label><br>
<br>
<input type="checkbox" name="Linguagens" id="C++" value="C++">
<label for="C++">C++</label><br><br>

<label for="comentarios">Comentarios</label><br>
<textarea name="comentarios" id="comentarios" rows="5" cols="30" placeholder="Tenho experiencia em" maxlength="10" required>

</textarea>
<br><br>
<label for="cidade">Cidade</label><br>
<select name="Cidade" id="">
    <option value="">--Selecione--</option>
    <option value="">Fortaleza</option>
    <option value="">Caucaia</option>
    <option value="">Eusebio</option> 
</select>

<br>
<br><br><br>
<input type="submit" value="Enviar">
</form>

</body>
</html>
