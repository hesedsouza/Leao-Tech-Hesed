<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="margin-bottom: 500px;">
    <h1> Trabalhando com tabelas</h1>
    <h3>Colspan</h1>
<table> 
<tr>
    <th>Nome</th>
    <th>Idade</th>
    <th>Cidade</th>
</tr>
<tr>
    <td>João</td>
    <td>29</td>
    <td>Fortaleza</td>
</tr>
<tr>
    <td>Maria</td>
    <td colspan="">28</td>
    <td>Caucaia</td>
    
</tr>
</table>
<br>
<hr>
<br>
<h3>rowspan</h3>
<table>
    <tr>
        <th>Linguagens</th>
        <th>Frameworks</th>
    </tr>
<tr>
    <td rowspan="2">Python</td>
    <td>Flask</td>
</tr>
<tr>
    <td>FastAPI</td>
</tr>
<tr>
    <td rowspan="2">JavaScript</td>
     <td>React</td>
   
</tr>
<tr>
    <td>Angular</td>
</tr>
</table>
<style>
    table, td, tr, th{
        border: 1px solid 
        black;
        border-collapse: collapse;
        padding: 3px;
    }

    
</style>
</body>
</html>
