<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABELA</title>
</head>

            <th>Total</th>
        </tr>
        <tr>
            <td><img src="../aula03/im2/noruega.jpg" alt=""></td>
            <td>Noruega</td>
            <td>16</td>
            <td>8</td>
            <td>13</td>
            <td>37</td>
        </tr>
        <tr>
            <td><img src="../aula03/im2/roc.jpg" alt=""></td>

            <td>6</td>

        <tr>

            <td>25</td>
        </tr>
    </table>
    <style>
        table,
        td,
        tr,
        th {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 3px;
        }
    </style>
    <style>
        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 5px;
        }

        th {
            background-color: rgb(233, 233, 233);
            text-align: center;
        }

        img {
            width: 30px;
        }
    </style>
    <br>
    <br>
    <table>
        <tr>
            <th rowspan="2" colspan="2"></th>
            <th colspan="3">Demografia</th>
        </tr>
        <tr>
            <td>Meninos</td>
            <td>Meninas</td>
            <td>Professor</td>
        </tr>
        <tr>
            <td rowspan="4">Turmas</td>
            <td>A</td>
            <td>20</td>
            <td>5</td>
            <td rowspan="2">João Pedro</td>
        </tr>

        <tr>
            <td>B</td>
            <td>21</td>
            <td>3</td>
        </tr>
        <tr>
            <td>C</td>
            <td>25</td>
            <td>2</td>
            <td rowspan="2">Maria João</td>
        </tr>
        <tr>
            <td>D</td>

        <tr>

</html>
