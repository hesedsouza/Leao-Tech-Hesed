<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <style>
        .container {
            border: 2px solid black;
            height: 800px;
        }

        .h1-layout {
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: beige;
        }

        .borda {
            border: 2px solid black;
        }

        .container-caixas {


            background-color: gray
        }

        .caixa {
            width: 100px;
            height: 100px;
            border: 2px solid black;
            display: inline-block;
            margin: 5px;
        }

        .div1 {
            display: block;
            width: 25%;
        }

        .div2{
            display: block;
            width: 50%;
        }

        .div3{
            display: block;
            width: 70%;
        }
    </style>

    <div class="container">
        <h1 class="h1-layout">Divs</h1>

        <div class="container-caixas borda">

            <div class="caixa1 caixa">Caixa1</div>
            <div class="caixa2 caixa">Caixa2</div>
            <div class="caixa3 caixa">Caixa3</div>
            <div class="caixa4 caixa">Caixa4</div>

        </div>

    </div>

    <div>
        <h1 class="h1-layout">DIVs</h1>
        <div class="caixa div1">DIV1</div>
        <div class="caixa div2">DIV2</div>
        <div class="caixa div3">DIV3</div>
    </div>

</body>

</html>
